<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, Arial, sans-serif">
  <title id="title">ssuMCP service and production architecture</title>
  <desc id="desc">ssuMCP exposes REST and MCP adapters through a shared Spring service layer. Production runs two to three pods on k3s with PostgreSQL as the durable source of truth, Redis for coordination and cache, Kafka for durable events, school-system connectors, GitOps delivery, and three-pillar observability.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2328"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect width="1600" height="940" fill="#ffffff"/>
  <text x="42" y="45" font-size="24" font-weight="750" fill="#0f172a">ssuMCP · Service and production architecture</text>
  <text x="42" y="71" font-size="13" fill="#64748b">One business core serves REST and MCP; durable correctness stays in PostgreSQL while Redis and Kafka handle scale-out concerns.</text>

