services:
  n8n:
    image: n8nio/n8n:2.27.5
    ports:
      # Bind to localhost only — this demo has no TLS/ingress in front of it.
      - "127.0.0.1:5678:5678"
    environment:
      # n8n 2.x removed basic auth. This localhost-only demo uses n8n's built-in
      # user management: complete the one-time owner setup in the UI on first run.
      - WEBHOOK_URL=http://localhost:5678/
      - DISCORD_WEBHOOK_URL_NOTICE=${DISCORD_WEBHOOK_URL_NOTICE}
      - DISCORD_WEBHOOK_URL_WEEKLY=${DISCORD_WEBHOOK_URL_WEEKLY}
      - SSUAI_API_BASE=https://ssumcp.duckdns.org
      # n8n 2.x blocks {{ $env.* }} in node expressions by default; our workflows
      # read the webhook URLs + API base via $env, so re-enable env access.
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro

volumes:
  n8n_data:
