apiVersion: 1

# SET A — distributed traces (Tempo) + central logs (Loki), correlated by traceId.
datasources:
  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://tempo:3200
    editable: true
    jsonData:
      # Jump from a span to its logs: Tempo -> Loki filtered by the same traceId.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        tags:
          - key: service.name
            value: service

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    editable: true
    jsonData:
      # Jump from a log line back to its trace via the JSON traceId field.
      derivedFields:
        - name: traceId
          matcherType: label
          matcherRegex: traceId
          url: '$${__value.raw}'
          datasourceUid: tempo
