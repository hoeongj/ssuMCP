server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      # Backend logs are JSON (LogstashEncoder, json-logs profile). Promote traceId to a
      # label so a log line links back to its trace (Loki derivedFields -> Tempo).
      - json:
          expressions:
            traceId: traceId
            level: level
      - labels:
          traceId:
          level:
