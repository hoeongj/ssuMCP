  PII-scrubbed minimal copy of a ZCMB3W0017 "이전학기" button-press
  (WD01F0, PREVIOUS) response (Task 16 PR 16c follow-up spike).

  Captured 2026-05-16 right after the user clicked 이전학기 once from
  the default first-load page. The response shape is a WebDynpro
  full-update XML wrapper (same envelope as grades-success.html), but
  the 학기별 세부 표 (the second tbody[id$="-contentTBody"] in
  document order) is now **populated** with the previous term's
  per-course rows. The real response also re-renders the top 학기별
  GPA history table and the 학적부/증명 summaries unchanged; we keep
  an EMPTY-rows placeholder for the history tbody so the parser's
  "second tbody = detail" indexing still resolves correctly. The
  connector ignores the history / summary blocks on prev hops.

  What the parser keys off (kept verbatim):
    - tbody[id$="-contentTBody"] (WD ID prefix is dynamic, suffix stable)
    - tr[rt="2"] header row, tr[rt="1"] data rows
    - td[role="gridcell"][cc="N"]: cc=0 select, cc=1..7 = 성적 / 등급 /
      과목명 / 상세성적(학수번호) / 과목학점 / 교수명 / 비고
    - <span class*="lsTextView--wrap"> text content
    - <input id="sap-wd-secure-id"> (CSRF, rotates per POST)

  Two data rows are kept to exercise both row shapes:
    1. Letter-grade course (점수+등급+과목명+학수번호+학점+교수+비고)
    2. P/F course (성적="P", 등급="P" — same generic strings on both)

  Real responses carry 5~10 rows per term; row count is not load-bearing
  for the parser, so two is enough to assert the column mapping and
  the cc-attribute drift handling.

  All concrete values (점수, 등급, 과목명, 학수번호, 교수명) are generic
  placeholders. Student id / name never appear in this response shape.
-->
