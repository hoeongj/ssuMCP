<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<!-- The greeting span exists but its text does not end with any of the
     suffixes our parser knows ("님 접속을 환영합니다." / "님 환영합니다."
     / trailing "님"). Asserts that the parser refuses unknown copy
     rather than persisting a name that still has the greeting tail
     attached. -->
<header>
  <div class="top_wrap">
    <div class="top_box">
      <span class="top_user">Welcome, John Doe</span>
    </div>
  </div>
</header>
</body>
</html>
