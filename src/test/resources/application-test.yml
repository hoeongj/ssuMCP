server:
  port: 0

management:
  tracing:
    enabled: false   # tests never reach an OTLP exporter

logging:
  level:
    root: WARN
    com.ssuai: DEBUG
    com.ssuai.global.exception.GlobalExceptionHandler: OFF
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: ERROR
    org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver: ERROR

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV4
  mvc:
    async:
      request-timeout: 2s
  task:
    scheduling:
      enabled: false
  ai:
    mcp:
      client:
        enabled: false

ssuai:
  library:
    redis:
      enabled: false
  connector:
    chat: mock
    department-notice: mock
  academic-policy:
    refresh-enabled: false
    initial-delay-ms: 3600000
