# Export profile — one-shot weekly meal + dorm meal JSON export, NOT the API server.
# Activate with: --spring.profiles.active=export
# WeeklyMealExportRunner will call SpringApplication.exit() after writing,
# so this profile must never be combined with the API server runtime.
ssuai:
  connector:
    meal: real
    dorm-meal: real
  meal:
    export:
      enabled: true
      # output: exports/meal/weekly-meals-<startDate>_<endDate>.json
      # start-date: 2026-05-04
