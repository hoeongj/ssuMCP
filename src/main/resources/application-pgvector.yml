# Optional `pgvector` profile — adds the pgvector Flyway location on top of the default vendor
# migrations and activates PgVectorAnnIndex. ACTIVE in prod (springProfilesActive: prod,pgvector):
# prod Postgres runs pgvector/pgvector:pg17 with the `vector` extension (0.8.4), and
# academic_embeddings.embedding_vec is populated with an HNSW index. The live RAG serving path still
# uses the in-memory cosine store (PgVectorAnnIndex has no production caller yet); this profile
# provisions the schema and proves ANN in isolation (PgVectorAnnIndexIT). See ADR 0070 (2026-07-09 amendment).
spring:
  flyway:
    locations: classpath:db/migration/V*__*.sql,classpath:db/migration/{vendor},classpath:db/migration/pgvector
