namespace: ssuai-prod
# P1-10 (ADR 0088): 2 replicas is the HA floor — matches the maxUnavailable:0
# rolling-update strategy below (a single pod can never satisfy "0 unavailable"
# during a rollout) and the ADR 0078 capacity table, which already budgets
# 512Mi request x 2 for this exact reason.
replicaCount: 2
image:
  repository: ghcr.io/ghdtjdwn/ssumcp
  tag: sha-11551e0348c6487d0201ebe236f47092e1ac35a6
  pullPolicy: Always
nameOverride: ""
fullnameOverride: ""
env:
  # pgvector profile ON (prerequisite satisfied 2026-07-02: prod Postgres runs
  # pgvector/pgvector:pg17, `vector` 0.8.4 available, so Flyway V14's
  # CREATE EXTENSION succeeds). At the current ~200-chunk corpus the in-memory
  # cosine store is already instant — this adds ANN capability ahead of corpus
  # growth. See ADR 0070 + activation checklist.
  # SET A observability (ADR 0069 활성화 절차 ②): the `json-logs` profile enables the
  # logback JSON (LogstashEncoder) stdout appender; the two envs below start tracing.
  springProfilesActive: prod,pgvector,json-logs
  tracingSampleRate: "0.1"
  otlpTracingEndpoint: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  frontendOrigin: https://ssuai.vercel.app
  dbUrl: "jdbc:postgresql://postgres-service:5432/ssuai"
  dbUsername: "ssuai"
  # Public HTTPS origin that SmartID can call back to. In prod this is the
  # Vercel frontend origin, whose Next.js rewrite proxies /api/* to the
  # backend so refresh/session cookies land as first-party browser cookies.
  #
  # SmartID 302s back to
  # ${apiBaseUrl}/api/auth/saint/sso-callback with sToken/sIdno after the
  # user logs in. SmartID needs an absolute URL — relative paths get
  # interpreted against smartid.ssu.ac.kr itself and the callback never
  # reaches us. SaintSsoCallbackController fails fast on startup if this
  # env var is empty.
  apiBaseUrl: https://ssuai.vercel.app
  # MCP auth callbacks should go directly to the backend ingress. MCP clients
  # already connect to this origin for SSE, and this avoids relying on the
  # Vercel /api proxy for SmartID returns.
  mcpApiBaseUrl: https://ssumcp.duckdns.org
  # Public host for LMS material export ZIP download links (capability URLs
  # returned by confirm_lms_material_export). Same host as mcpApiBaseUrl but
  # kept as its own key since the two configs serve different purposes.
  lmsExportPublicBaseUrl: https://ssumcp.duckdns.org
  # Directory the async export worker writes ZIPs to. Points at the PVC mount
  # (persistence.lmsExport.mountPath) so a built ZIP survives a pod restart
  # between confirm_lms_material_export and the user's download. Without this
  # it defaults to the pod-local java.io.tmpdir, which is lost on restart and
  # not shared across replicas.
  lmsExportTempDir: /data/lms-export
  tavilyMcpUrl: ""
  javaOpts: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError -Djava.io.tmpdir=/tmp -Djna.tmpdir=/tmp"
  connectorMeal: real
  connectorDormMeal: real
  connectorLibraryBook: real
  connectorLibraryLoans: real
  connectorLibrarySeat: real
  connectorLibraryReservation: real
  connectorSaintSchedule: rusaint
  connectorSaintGrades: rusaint
  connectorLmsAssignments: real
  connectorLmsMaterials: real
  connectorChat: llm
  # broker = Unit 0 / ADR 0089; fail-open so a broker outage never affects tool calls.
  kafkaEnabled: "true"
  springKafkaBootstrapServers: "kafka-0.kafka.ssuai-prod.svc.cluster.local:9092"
  # Phase 2-C / ADR 0091: reservation intent-status fan-out over Kafka. "true" = graduated to Kafka
  # (live cutover on fixed image 0bf4fd8, @Primary). Rollback = set "false" (RTopic path, no redeploy).
  kafkaIntentBusEnabled: "true"
  mistralTrainingOptOutConfirmed: "false"
  llmMaxTokens: "400"
  llmAvailabilityVerificationPasses: "0"
  llmMaxProviderAttempts: "6"
  llmMaxModelsPerProvider: "2"
  llmMaxToolCalls: "2"
  # Hybrid RAG embedding (lexical + Gemini cosine, RRF fusion). Reuses
  # SSUAI_GEMINI_API_KEY from the secret; falls back to lexical-only if the
  # embedding API is unreachable.
  academicEmbeddingEnabled: "true"
  # Model choice (re-verified 2026-06-23 via direct OpenAI-compat /embeddings calls):
  # - gemini-embedding-001 (GA): the 2026-06-11 "quota stuck at 0" had recovered
  #   by 2026-06-23. Free tier is token-per-minute capped (~30k TPM), so the batch
  #   sizing (below) must keep each request's tokens under that, or large batches 429.
  # - gemini-embedding-2-preview: tighter quota (value 100, 429 recovers ~52s) ->
  #   the corpus perpetually 429'd -> embeddingActive false (dormant hybrid RAG,
  #   the 2026-06-23 symptom).
  # - text-embedding-004 -> 404 (deprecated); gemini-embedding-2 (no -preview) ->
  #   wrong model ID. See ADR 0065 / TROUBLESHOOTING 사건 19.
  academicEmbeddingModel: "gemini-embedding-001"
  # Free-tier limit is TOKENS per minute (~30k TPM), not request count. The earlier
  # 72-input batches were ~50k tokens each and 429'd the first request of every
  # refresh, so the ~217-chunk corpus never embedded (prod 2026-06-29, 사건 21).
  # 8 chunks ≈ 6k tokens/request; at 15s spacing ≈ 22k tokens/min stays under the cap.
  # The persistent store keeps each batch it embeds, so the corpus warms across a few
  # scheduled refreshes even if one pass 429s partway.
  academicEmbeddingBatchSize: "8"
  academicEmbeddingBatchIntervalMs: "15000"
  redisHost: ""
  redisPort: "6379"
  redisTimeout: 500ms
  redisConnectTimeout: 500ms
  libraryRedisEnabled: "true"
  librarySeatEventChannel: ssuai.library.seat-events.v1
  librarySchedulerLockWait: 0ms
  oauthRsEnabled: "true"
  oauthIssuerUri: "https://dev-q784z2phbyf5gzj7.us.auth0.com/"
  oauthAudience: "https://ssumcp.duckdns.org/mcp"
redis:
  enabled: true
  image:
    repository: redis
    tag: 8.8.0-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  maxmemory: 64mb
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
secretRef:
  enabled: true
  name: ssuai-backend-secrets
  # Core DB/JWT/credential-encryption secrets are mandatory. Keeping this false
  # prevents a rollout from starting pods that can only fail later in the
  # application-level ProdConfigValidator.
  optional: false
librarySamplerSecretRef:
  enabled: true
  name: ssuai-library-sampler
  optional: true
secretTemplate:
  enabled: false
  stringData:
    SSUAI_DB_PASSWORD: "<replace-me>"
    SSUAI_GEMINI_API_KEY: "<replace-me>"
    SSUAI_GROQ_API_KEY: "<replace-me>"
    SSUAI_CEREBRAS_API_KEY: "<replace-me>"
    SSUAI_DEEPINFRA_API_KEY: "<replace-me>"
    SSUAI_SAMBANOVA_API_KEY: "<replace-me>"
    SSUAI_NSCALE_API_KEY: "<replace-me>"
    SSUAI_FIREWORKS_API_KEY: "<replace-me>"
    SSUAI_HUGGINGFACE_API_KEY: "<replace-me>"
    SSUAI_MISTRAL_API_KEY: "<replace-me>"
    SSUAI_OPENROUTER_API_KEY: "<replace-me>"
service:
  type: ClusterIP
  port: 8080
  # Traefik balances across pod endpoints directly (nativeLB off), so a Service
  # sessionAffinity is bypassed. MCP streamable-HTTP sessions are pod-local, so
  # pin a client to one backend pod for the life of its session via a Traefik
  # sticky cookie. See ADR 0092.
  stickyCookie:
    enabled: true
    name: mcp_lb_affinity
ingress:
  enabled: true
  className: traefik
  host: ssumcp.duckdns.org
  tlsSecretName: ssumcp-duckdns-org-tls
  clusterIssuer: letsencrypt-prod
  middlewares:
    redirectHttps: redirect-https
    hsts: hsts
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
# P1-10 (ADR 0088): scale out on CPU pressure, bounded at 3 replicas because
# 3 x 512Mi request (1.5Gi) is the most the ADR 0078 headroom (~2.3G) can take
# without also touching the trim order (§4 of that ADR). Gated behind a flag
# so a future capacity crunch can disable it without deleting the block.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
# P1-10 (ADR 0088): guarantee at least 1 pod stays Ready through voluntary
# disruptions (node drain, ArgoCD-triggered pod eviction, etc.) that are not
# already covered by the Deployment's own maxUnavailable:0 rolling strategy.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
serviceMonitor:
  enabled: true
podSecurityContext:
  terminationGracePeriodSeconds: 30
  # Applied to the pod when persistence.lmsExport is enabled so the kubelet
  # group-owns the PVC mount as gid 1001 — the container runs as uid 1001 and
  # must be able to write ZIPs into the volume.
  fsGroup: 1001
# Durable storage for the LMS export ZIP cache (ADR 0084). k3s local-path is
# RWO and node-local: two backend pods may mount it read-write only because prod
# is a single-node k3s cluster. A multi-node move must switch this to RWX storage
# or S3/MinIO; do not treat this PVC as a multi-node storage design.
persistence:
  lmsExport:
    enabled: true
    size: 5Gi
    storageClass: local-path
    mountPath: /data/lms-export
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  # LMS export writes go to the /data/lms-export PVC. JVM/JNA scratch is
  # pinned to a writable /tmp emptyDir, so the root filesystem can be read-only.
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
    - ALL
