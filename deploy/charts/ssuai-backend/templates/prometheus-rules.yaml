apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ssuai-alerts
  namespace: monitoring
  labels:
    release: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  groups:
    - name: ssuai
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{application="ssuai",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="ssuai"}[5m])) > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI 5xx rate > 5%"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_server_requests_seconds_bucket{application="ssuai"}[5m])) by (le)
            ) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI p99 latency > 3s"

        - alert: CircuitBreakerOpen
          expr: resilience4j_circuitbreaker_state{state="open"} == 1
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Circuit Breaker OPEN 상태 감지"
            description: "인스턴스 {{ $labels.instance }}의 서킷 브레이커 {{ $labels.name }}가 OPEN 되었습니다. 외부 API 연동이 일시 차단되고 폴백 로직으로 동작합니다."
