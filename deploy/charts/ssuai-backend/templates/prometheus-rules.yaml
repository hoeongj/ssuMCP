apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ssuai-alerts
  namespace: monitoring
  labels:
    release: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  groups:
    - name: ssuai
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{application="ssuai",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="ssuai"}[5m])) > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI 5xx rate > 5%"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_server_requests_seconds_bucket{application="ssuai"}[5m])) by (le)
            ) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI p99 latency > 3s"
