apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ssuai-backend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssuai-backend.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ssuai-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the ConfigMap changes — envFrom values are read once
        # at container start, so without this a ConfigMap-only sync would
        # leave running pods on stale env vars.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "ssuai-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: ssuai
    spec:
      terminationGracePeriodSeconds: {{ .Values.podSecurityContext.terminationGracePeriodSeconds }}
      containers:
        - name: backend
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ssuai-backend.fullname" . }}-config
            {{- if .Values.secretRef.enabled }}
            - secretRef:
                name: {{ .Values.secretRef.name }}
                optional: {{ .Values.secretRef.optional }}
            {{- end }}
            {{- if .Values.librarySamplerSecretRef.enabled }}
            - secretRef:
                name: {{ .Values.librarySamplerSecretRef.name }}
                optional: {{ .Values.librarySamplerSecretRef.optional }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
