{{- if .Values.secretTemplate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssuai-backend.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  {{- range $key, $value := .Values.secretTemplate.stringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
