{{- if .Values.persistence.lmsExport.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ssuai-backend.fullname" . }}-lms-export
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssuai-backend.labels" . | nindent 4 }}
  annotations:
    # Same sync-wave as the Deployment (3): local-path is WaitForFirstConsumer,
    # so the PVC binds only once its consumer pod is scheduled. An earlier wave
    # makes ArgoCD wait for the PVC to be Healthy before applying the Deployment,
    # but the consumer is then never created — the sync deadlocks (see TROUBLESHOOTING).
    argocd.argoproj.io/sync-wave: "3"
    # Never prune the ZIP cache volume if it is ever dropped from the chart —
    # losing it would 410 every in-flight capability download link.
    # helm.sh/resource-policy guards `helm uninstall`; Prune=false guards ArgoCD.
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    # ADR 0084: local-path RWO is acceptable only for the current single-node
    # k3s cluster. Multi-node scheduling requires RWX storage or S3/MinIO.
    - ReadWriteOnce
  {{- if .Values.persistence.lmsExport.storageClass }}
  storageClassName: {{ .Values.persistence.lmsExport.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.lmsExport.size | quote }}
{{- end }}
