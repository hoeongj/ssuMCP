# kube-prometheus-stack values for single-node Oracle Cloud ARM64 k3s
# Applied by the ArgoCD Application in deploy/argocd/application-monitoring.yaml.
# Grafana Discord contact point: configure via Grafana UI after first deploy
# (Alerting > Contact points > Add > Discord, paste webhook URL).

prometheus:
  prometheusSpec:
    # Pick up ServiceMonitors from all namespaces (not just the release namespace).
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  additionalDataSources:
    # SET A observability datasources (Tempo traces + Loki logs), correlated by traceId.
    # In-cluster service URLs — Tempo/Loki live in this same `monitoring` namespace.
    - name: Tempo
      type: tempo
      access: proxy
      uid: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      jsonData:
        # Span -> logs: open Loki filtered by this span's trace id (±1h window).
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: -1h
          spanEndTimeShift: 1h
          filterByTraceID: true
    - name: Loki
      type: loki
      access: proxy
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        # Log line -> trace: pull traceId out of the JSON body (regex on content, so no
        # high-cardinality UUID label is created) and link to the Tempo datasource.
        derivedFields:
          - name: traceId
            matcherType: regex
            matcherRegex: '"traceId":"(\w+)"'
            url: '$${__value.raw}'
            datasourceUid: tempo
  # Set via k8s Secret: kubectl -n monitoring create secret generic grafana-admin \
  #   --from-literal=admin-user=admin --from-literal=admin-password=<your-password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - ssumcp.duckdns.org
    path: /grafana
    pathType: Prefix
    tls:
      - secretName: grafana-ssumcp-duckdns-org-tls
        hosts:
          - ssumcp.duckdns.org
  grafana.ini:
    server:
      root_url: https://ssumcp.duckdns.org/grafana
      serve_from_sub_path: true
    analytics:
      reporting_enabled: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# k3s does not expose these endpoints — disable to prevent scrape errors.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
