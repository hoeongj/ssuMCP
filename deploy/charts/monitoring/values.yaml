# kube-prometheus-stack values for single-node Oracle Cloud ARM64 k3s
# Applied by the ArgoCD Application in deploy/argocd/application-monitoring.yaml.
# Grafana Discord contact point: configure via Grafana UI after first deploy
# (Alerting > Contact points > Add > Discord, paste webhook URL).

prometheus:
  # cert-manager exposes /metrics on 9402 but ships no ServiceMonitor of its own;
  # scraping it feeds the SsuaiCertRenewalStalled alert below.
  additionalServiceMonitors:
    - name: cert-manager
      namespaceSelector:
        matchNames:
          - cert-manager
      selector:
        matchLabels:
          app.kubernetes.io/name: cert-manager
          app.kubernetes.io/component: controller
      endpoints:
        - port: tcp-prometheus-servicemonitor
          interval: 60s
  prometheusSpec:
    # Pick up ServiceMonitors from all namespaces (not just the release namespace).
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  additionalDataSources:
    # SET A observability datasources (Tempo traces + Loki logs), correlated by traceId.
    # In-cluster service URLs — Tempo/Loki live in this same `monitoring` namespace.
    - name: Tempo
      type: tempo
      access: proxy
      uid: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      jsonData:
        # Span -> logs: open Loki filtered by this span's trace id (±1h window).
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: -1h
          spanEndTimeShift: 1h
          filterByTraceID: true
    - name: Loki
      type: loki
      access: proxy
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        # Log line -> trace: pull traceId out of the JSON body (regex on content, so no
        # high-cardinality UUID label is created) and link to the Tempo datasource.
        derivedFields:
          - name: traceId
            matcherType: regex
            matcherRegex: '"traceId":"(\w+)"'
            url: '$${__value.raw}'
            datasourceUid: tempo
  # Set via k8s Secret: kubectl -n monitoring create secret generic grafana-admin \
  #   --from-literal=admin-user=admin --from-literal=admin-password=<your-password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - ssumcp.duckdns.org
    path: /grafana
    pathType: Prefix
    tls:
      - secretName: grafana-ssumcp-duckdns-org-tls
        hosts:
          - ssumcp.duckdns.org
  grafana.ini:
    server:
      root_url: https://ssumcp.duckdns.org/grafana
      serve_from_sub_path: true
    analytics:
      reporting_enabled: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# k3s does not expose these endpoints — disable to prevent scrape errors.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Operational alert rules (visible in Grafana/Alertmanager even before a Discord
# contact point is configured — that last step is a Grafana-UI-only operation).
additionalPrometheusRulesMap:
  ssuai-ops:
    groups:
      - name: ssuai-ops
        rules:
          - alert: SsuaiBackendDown
            expr: absent(up{job="ssuai-backend"} == 1)
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "ssuai-backend scrape target is gone or down"
              description: "Prometheus has no healthy ssuai-backend target for 3 minutes."
          - alert: SsuaiHigh5xxRate
            expr: |
              sum(rate(http_server_requests_seconds_count{namespace="ssuai-prod", status=~"5.."}[5m]))
                / clamp_min(sum(rate(http_server_requests_seconds_count{namespace="ssuai-prod"}[5m])), 1e-9) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "ssuai-backend 5xx ratio above 5%"
              description: "More than 5% of requests returned 5xx over the last 5 minutes."
          - alert: SsuaiJvmHeapHigh
            expr: |
              sum(jvm_memory_used_bytes{namespace="ssuai-prod", area="heap"})
                / sum(jvm_memory_max_bytes{namespace="ssuai-prod", area="heap"} > 0) > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "ssuai-backend JVM heap above 90%"
              description: "Sustained heap pressure — check for leaks or lower the workload before the OOM killer does."
          - alert: SsuaiPodRestartLoop
            expr: increase(kube_pod_container_status_restarts_total{namespace="ssuai-prod"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.pod }} restarted more than 3 times in 1h"
              description: "Container {{ $labels.container }} in {{ $labels.pod }} is crash-looping."
          - alert: SsuaiCertRenewalStalled
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
            for: 1h
            labels:
              severity: critical
            annotations:
              summary: "TLS cert {{ $labels.name }} expires in under 14 days"
              description: "cert-manager renews Let's Encrypt certs ~30 days before expiry; under 14 days means renewal is failing."
