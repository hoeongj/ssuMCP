# Example only. The real Secret is created out-of-band (secretTemplate.enabled=false
# by default, and the ArgoCD app references n8n-secrets as optional). DO NOT commit
# real values. Create it with:
#
#   # n8n 2.x uses user management (no basic auth); the owner password must be a
#   # bcrypt hash: HASH=$(htpasswd -bnBC 12 "" '<owner-pw>' | tr -d ':\n' | sed 's/\$2y/\$2a/')
#   kubectl create secret generic n8n-secrets \
#     --namespace ssuai-prod \
#     --from-literal=N8N_INSTANCE_OWNER_PASSWORD_HASH="$HASH" \
#     --from-literal=N8N_ENCRYPTION_KEY="$(openssl rand -hex 24)" \
#     --from-literal=N8N_USER_MANAGEMENT_JWT_SECRET="$(openssl rand -hex 24)" \
#     --from-literal=DISCORD_WEBHOOK_URL_NOTICE='https://discord.com/api/webhooks/<id>/<token>' \
#     --from-literal=DISCORD_WEBHOOK_URL_WEEKLY='https://discord.com/api/webhooks/<id>/<token>'
#
# Set secretTemplate.enabled=true ONLY for a throwaway/dev render (never with real values).
{{- if .Values.secretTemplate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- toYaml .Values.secretTemplate.stringData | nindent 2 }}
{{- end }}
