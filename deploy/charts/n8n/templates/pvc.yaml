{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "n8n.fullname" . }}-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  annotations:
    # Co-located with the Deployment (sync-wave 3): the PVC uses local-path
    # (WaitForFirstConsumer), so it only binds once its consumer pod is
    # scheduled. Gating an earlier wave on its health would deadlock the sync.
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
