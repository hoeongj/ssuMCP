# grafana/promtail — DaemonSet log collector for the single-node k3s. Applied by
# deploy/argocd/application-promtail.yaml. Tails every pod's stdout and pushes to
# Loki. ssuai-backend lines are JSON (logback json-logs profile), so Grafana's Loki
# datasource extracts traceId from the log body at query time — no high-cardinality
# label is promoted. ADR 0069 대안: stdout-JSON + Promtail (app decoupled from Loki).

config:
  logLevel: warn
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 128Mi

serviceMonitor:
  enabled: false

# k3s stores container logs under /var/lib/rancher/k3s/agent/containerd/...; the files
# in /var/log/pods are symlinks into that tree. Without this mount promtail resolves the
# symlink to a path outside its filesystem and reads nothing (Loki stays empty on k3s).
extraVolumes:
  - name: k3s-containerd-logs
    hostPath:
      path: /var/lib/rancher/k3s
extraVolumeMounts:
  - name: k3s-containerd-logs
    mountPath: /var/lib/rancher/k3s
    readOnly: true
