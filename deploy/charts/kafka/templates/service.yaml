apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafka.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterIP: None
  # KRaft controller self-dials kafka-0.kafka...svc:9093 during boot before
  # the pod is Ready; publishing the DNS A record only after Ready would
  # deadlock quorum formation.
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: broker
      protocol: TCP
    - name: controller
      port: 9093
      targetPort: controller
      protocol: TCP
