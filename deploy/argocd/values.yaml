# Upstream chart: argo/argo-cd, pinned in deploy/argocd/README.md.
# Keep this minimal: single-operator project, no Dex/SSO yet.
global:
  domain: argo-ssuai.duckdns.org

dex:
  enabled: false

notifications:
  enabled: false

# Not used: Applications here are all managed as plain Application manifests,
# not ApplicationSet generators. This chart version has no enabled/disabled
# switch for the controller (its Deployment template is unconditional), so
# scale it to zero replicas to free a pod on the halved Oracle free tier
# (2 OCPU / 12GB single-node budget).
applicationSet:
  replicas: 0

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: false

configs:
  params:
    server.insecure: true
