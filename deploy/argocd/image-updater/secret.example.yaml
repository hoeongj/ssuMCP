# Template only - do not commit a real PAT.
#
# Create a fine-grained GitHub PAT with contents:write on hoeongj/ssuMCP only.
# Then apply a copied Secret outside the repo:
#
# kubectl -n argocd create secret generic argocd-image-updater-git-creds \
#   --from-literal=username=argocd-image-updater \
#   --from-literal=password=<GITHUB_FINE_GRAINED_PAT> \
#   --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: argocd-image-updater-git-creds
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  username: argocd-image-updater
  password: "<replace-with-fine-grained-github-pat>"
