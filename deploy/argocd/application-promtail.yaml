apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  sources:
    # Upstream Promtail chart (DaemonSet log collector)
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: "6.17.1"
      helm:
        valueFiles:
          - $values/deploy/charts/promtail/values.yaml
    # Values file from this repo
    - repoURL: https://github.com/ghdtjdwn/ssuMCP.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
