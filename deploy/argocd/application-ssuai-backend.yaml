apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssuai-backend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: "backend=ghcr.io/ghdtjdwn/ssumcp"
    argocd-image-updater.argoproj.io/backend.update-strategy: "newest-build"
    argocd-image-updater.argoproj.io/backend.allow-tags: "regexp:^sha-[0-9a-f]{40}$"
    argocd-image-updater.argoproj.io/backend.helm.image-name: "image.repository"
    argocd-image-updater.argoproj.io/backend.helm.image-tag: "image.tag"
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-git-creds"
    argocd-image-updater.argoproj.io/git-branch: "main"
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues:values.yaml"
spec:
  project: default
  source:
    repoURL: https://github.com/ghdtjdwn/ssuMCP.git
    targetRevision: main
    path: deploy/charts/ssuai-backend
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ssuai-prod
  # P1-10 (ADR 0088): the HPA (autoscaling.enabled, chart) now mutates
  # Deployment.spec.replicas at runtime. Without this, selfHeal below reverts
  # every HPA scale-up back to the git-declared replicaCount on the next sync
  # (default 3-minute poll) — the HPA and GitOps drift-correction would fight
  # each other, and the chart's maxReplicas would never actually take effect.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: ssuai-backend
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
