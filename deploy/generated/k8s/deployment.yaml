apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssuai-backend
  namespace: ssuai-prod
  labels:
    app.kubernetes.io/name: ssuai-backend
    app.kubernetes.io/part-of: ssuai
spec:
  # Single replica is fine for current traffic. Multi-replica + HPA
  # lands with Task 08 once Prometheus + metrics-server are in.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ssuai-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ssuai-backend
        app.kubernetes.io/part-of: ssuai
    spec:
      # Wait up to 30s for in-flight requests to drain on rolling update.
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          # The image tag is bumped to the deployed commit SHA on each
          # rollout — see deploy/README.md §"Upgrade workflow". `latest`
          # is the bootstrap value; never rely on it in production traffic.
          image: ghcr.io/hoeongj/ssumcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ssuai-backend-config
            - secretRef:
                name: ssuai-backend-secrets
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Liveness vs readiness are split deliberately. Spring Boot's
          # K8s probes group exposes /actuator/health/liveness (JVM up?)
          # and /actuator/health/readiness (ready for traffic? — bound to
          # ReadinessState + readiness-grouped health indicators). Using
          # plain /actuator/health for liveness would let any future
          # health indicator (DB, cache) restart the pod on a transient
          # downstream blip. See ADR 0007 §"Consequences".
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
