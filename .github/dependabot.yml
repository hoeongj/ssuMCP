version: 2

updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      server-minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, backend]
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(deps)
      include: scope

# Major-version bumps continue to file individual PRs for focused review.
# Security advisories file out-of-band PRs immediately by default.
