name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build JAR + GitHub Release + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Rename JAR
        run: |
          mv build/libs/ssuai-backend-*.jar build/libs/ssuMCP-${{ steps.ver.outputs.VERSION }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: build/libs/ssuMCP-${{ steps.ver.outputs.VERSION }}.jar
          generate_release_notes: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump npm version
        run: |
          cd npm
          npm version ${{ steps.ver.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
