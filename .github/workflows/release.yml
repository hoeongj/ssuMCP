name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build JAR + GitHub Release + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build bootJar
        run: ./gradlew bootJar -x test

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Rename JAR
        run: |
          mv build/libs/ssuai-backend-*.jar build/libs/ssuMCP-${{ steps.ver.outputs.VERSION }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/ssuMCP-${{ steps.ver.outputs.VERSION }}.jar
          generate_release_notes: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump npm version
        run: |
          cd npm
          npm version ${{ steps.ver.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
