name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: kubectl set image on ssuai-prod
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.0

      - name: Deploy (or skip if KUBE_CONFIG is unset)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ssumcp
        run: |
          set -euo pipefail

          if [ -z "${KUBE_CONFIG}" ]; then
            echo "::notice::KUBE_CONFIG secret is not set; skipping deploy."
            echo "::notice::See deploy/README.md Section GitHub Actions deploy to enable."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          IMAGE="${IMAGE_REPO}:sha-${IMAGE_SHA}"
          echo "Setting image to ${IMAGE}"
          kubectl set image deployment/ssuai-backend \
            "backend=${IMAGE}" \
            -n ssuai-prod

          echo "Waiting for rollout (up to 6 minutes; ARM64 image pulls are slow)"
          kubectl rollout status deployment/ssuai-backend \
            -n ssuai-prod \
            --timeout=360s

          echo "Current image:"
          kubectl get pod -n ssuai-prod \
            -o jsonpath='{.items[*].spec.containers[*].image}'
          echo
