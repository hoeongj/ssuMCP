name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/charts/ssuai-backend/values.yaml'
      # Kafka chart is deploy-only and uses a pinned public image, so don't rebuild the backend image on it.
      - 'deploy/charts/kafka/**'
      # ArgoCD Application / ImageUpdater manifests are cluster wiring only — they
      # never affect the backend build, so don't rebuild+redeploy the image on them.
      - 'deploy/argocd/**'
      # Docs never affect the Gradle build — a docs-only change must not rebuild
      # and redeploy the backend image.
      - 'docs/**'
      - '**.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Gradle, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6
      - name: Test + coverage
        # Testcontainers (Postgres, Redis) run here because ubuntu-latest ships a Docker
        # daemon; the same ITs self-skip on machines without one (disabledWithoutDocker).
        # jacocoTestCoverageVerification fails the build if LINE coverage drops below the floor.
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-test-report
          path: build/reports/tests/test
          retention-days: 7
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/html
          retention-days: 7

  image-build:
    name: MCP Server image (ghcr.io, ARM64)
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ssumcp
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
